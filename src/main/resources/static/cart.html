<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - MediShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Medi<span>Shop</span></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="medicines.html">Medicines</a>
        <a href="cart.html">🛒 Cart</a>
        <a href="orders.html">Orders</a>
        <a href="login.html" id="authLink">Login</a>
    </div>
</nav>

<h2 class="page-title">Your Cart 🛒</h2>

<div class="cart-container">
    <div id="cartItems"></div>
    <div class="cart-summary" id="cartSummary" style="display:none;">
        <h3>Order Summary</h3>
        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
            <span>Delivery Charge</span>
            <span>₹50</span>
        </div>
        <div class="summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
        </div>
        <br>
        <div class="form-group">
            <label>Delivery Address</label>
            <input type="text" id="deliveryAddress" placeholder="Enter delivery address">
        </div>
        <button class="btn-success" onclick="placeOrder()">Place Order ✅</button>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script>
    if (Auth.isLoggedIn()) {
        document.getElementById('authLink').textContent = 'Logout';
        document.getElementById('authLink').onclick = Auth.logout;
    }
    loadCart();
</script>
</body>
</html>
