<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Medi<span>Shop</span></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="medicines.html">Medicines</a>
    </div>
</nav>

<div class="auth-container">
    <!-- Login Form -->
    <div class="auth-card" id="loginForm">
        <h2>Welcome Back 👋</h2>
        <div id="loginAlert"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        <button class="btn-primary" onclick="handleLogin()">Login</button>
        <div class="auth-toggle">
            Don't have an account?
            <span onclick="showRegister()">Register here</span>
        </div>
    </div>

    <!-- Register Form -->
    <div class="auth-card" id="registerForm" style="display:none;">
        <h2>Create Account 🏥</h2>
        <div id="registerAlert"></div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Create a password">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="regPhone" placeholder="Enter your phone">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" id="regAddress" placeholder="Enter your address">
        </div>
        <button class="btn-primary" onclick="handleRegister()">Register</button>
        <div class="auth-toggle">
            Already have an account?
            <span onclick="showLogin()">Login here</span>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
